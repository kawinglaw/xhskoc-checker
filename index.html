<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书 KOC 资源查重工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            font-family: 'PingFang SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .slide-up-fade-in {
            animation: slideUpFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes slideUpFadeIn {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn-hover-scale:active {
            transform: scale(0.98);
        }
        
        .theme-transition {
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }
        
        /* 深色主题 */
        .dark-theme {
            background-color: #0a0a0a;
            color: #fafafa;
        }
        
        .dark-theme .input-line {
            border-bottom-color: rgba(255, 255, 255, 0.2);
            color: #fafafa;
        }
        
        .dark-theme .input-line::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .dark-theme .input-line:focus {
            border-bottom-color: #ff2442;
        }
        
        .dark-theme .dropdown-bg {
            background-color: rgba(20, 20, 20, 0.98);
        }
        
        .dark-theme .ghost-btn {
            background-color: rgba(255, 36, 66, 0.08);
            border-color: rgba(255, 36, 66, 0.3);
            color: #ff2442;
        }
        
        .dark-theme .ghost-btn:hover {
            background-color: rgba(255, 36, 66, 0.12);
            border-color: rgba(255, 36, 66, 0.5);
        }
        
        /* 浅色主题 */
        .light-theme {
            background-color: #fafafa;
            color: #1a1a1a;
        }
        
        .light-theme .input-line {
            border-bottom-color: rgba(0, 0, 0, 0.15);
            color: #1a1a1a;
        }
        
        .light-theme .input-line::placeholder {
            color: rgba(0, 0, 0, 0.35);
        }
        
        .light-theme .input-line:focus {
            border-bottom-color: #ff2442;
        }
        
        .light-theme .dropdown-bg {
            background-color: rgba(255, 255, 255, 0.98);
        }
        
        .light-theme .ghost-btn {
            background-color: rgba(255, 36, 66, 0.06);
            border-color: rgba(255, 36, 66, 0.25);
            color: #ff2442;
        }
        
        .light-theme .ghost-btn:hover {
            background-color: rgba(255, 36, 66, 0.1);
            border-color: rgba(255, 36, 66, 0.4);
        }
        
        /* 主题切换按钮 - 无边框极简风格 */
        .theme-toggle-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .dark-theme .theme-toggle-btn {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .dark-theme .theme-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
        }
        
        .light-theme .theme-toggle-btn {
            color: rgba(0, 0, 0, 0.5);
        }
        
        .light-theme .theme-toggle-btn:hover {
            background-color: rgba(0, 0, 0, 0.06);
            color: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body class="dark-theme theme-transition min-h-screen flex flex-col items-center justify-center p-6">
   <!-- 主题切换按钮 -->
   <button id="theme-toggle" class="theme-toggle-btn absolute top-6 right-6">
        <span id="theme-icon">🌙</span>
        <span id="theme-text" class="ml-2">深色模式</span>
    </button>
    
    <!-- 主容器 - 严格居中 -->
    <div class="w-full max-w-md text-center">
        <!-- 标题 -->
        <h1 class="text-4xl md:text-5xl font-semibold mb-4 tracking-tight">KOC 资源查重</h1>
       <p class="text-sm opacity-40 mb-2">输入昵称快速查询是否已建联</p>
       <p id="data-update-time" class="text-xs opacity-30"></p>
        
        <!-- 间距 -->
        <div class="h-10"></div>
        
        <!-- 输入框 - 极简底线风格 -->
       <input 
            type="text" 
            id="search-input" 
            placeholder="输入 KOC 昵称..." 
            class="input-line w-full px-4 py-4 bg-transparent text-lg outline-none theme-transition"
            autocomplete="off"
            style="border-bottom: 1px solid;"
        >
        
        <!-- 联想下拉列表 -->
        <div id="suggestions-dropdown" class="hidden absolute left-0 right-0 mt-1 rounded-xl shadow-2xl dropdown-bg z-50 max-h-72 overflow-y-auto" style="max-width: 28rem; margin-left: auto; margin-right: auto;">
            <!-- 动态填充 -->
        </div>
        
        <!-- 间距 -->
        <div class="h-8"></div>
        
        <!-- 查询按钮 -->
        <button 
            id="search-btn" 
            class="w-full bg-[#ff2442] hover:bg-[#e02038] text-white font-medium py-4 rounded-full text-lg btn-hover-scale transition-all duration-200 shadow-lg shadow-red-500/25"
        >
            查询
        </button>
        
        <!-- 结果展示区域 - 无背景框，直接浮现 -->
        <div id="result-container" class="mt-10 hidden">
           <!-- 动态填充 -->
        </div>
    </div>
    
    <!-- 底部说明 -->
    <div class="absolute bottom-6 text-center text-xs opacity-25">
        <p>数据来源于 data.csv · 每次打开自动刷新</p>
    </div>

    <script>
        // 全局变量
        let kocData = [];
        let currentTheme = 'dark';
        
        // DOM 元素
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const suggestionsDropdown = document.getElementById('suggestions-dropdown');
        const resultContainer = document.getElementById('result-container');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const dataUpdateTime = document.getElementById('data-update-time');
        
        // 初始化
        async function init() {
            await loadCSVData();
            setupEventListeners();
            updateDataTimeDisplay();
        }
        
        // 加载 CSV 数据
        async function loadCSVData() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`./data.csv?t=${timestamp}`);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        kocData = results.data.filter(row => row['昵称'] && row['主页链接']);
                        console.log(`成功加载 ${kocData.length} 条 KOC 数据`);
                    },
                    error: function(error) {
                        console.error('CSV 解析失败:', error);
                        showResult('error', '数据格式有误');
                    }
                });
            } catch (error) {
                console.error('加载 CSV 失败:', error);
                showResult('error', '无法读取数据文件');
            }
        }
        
        // 设置事件监听
        function setupEventListeners() {
            // 输入框实时联想
            searchInput.addEventListener('input', handleInput);
            
            // 查询按钮点击
            searchBtn.addEventListener('click', handleSearch);
            
            // 回车键查询
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
            
            // 点击外部关闭下拉列表
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !suggestionsDropdown.contains(e.target)) {
                    hideSuggestions();
                }
            });
            
            // 主题切换
            themeToggle.addEventListener('click', toggleTheme);
        }
        
        // 处理输入（联想）
        function handleInput(e) {
            const query = e.target.value.trim();
            
            if (query.length === 0) {
                hideSuggestions();
                return;
            }
            
            // 模糊匹配：昵称包含输入字符
            const matches = kocData.filter(item => 
                item['昵称'].toLowerCase().includes(query.toLowerCase())
            ).slice(0, 10);
            
            if (matches.length > 0) {
                showSuggestions(matches, query);
            } else {
                hideSuggestions();
            }
        }
        
        // 显示联想列表
        function showSuggestions(matches, query) {
            suggestionsDropdown.innerHTML = '';
            
            matches.forEach(item => {
                const div = document.createElement('div');
                div.className = 'px-5 py-3.5 cursor-pointer transition-all duration-150 border-b border-opacity-5 border-gray-500 last:border-b-0 text-left';
                
                const darkMode = currentTheme === 'dark';
                div.style.color = darkMode ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.75)';
                div.style.fontSize = '14px';
                
                div.onmouseenter = () => {
                    div.style.backgroundColor = darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
                };
                
                div.onmouseleave = () => {
                    div.style.backgroundColor = 'transparent';
                };
                
                // 高亮匹配部分
                const nickname = item['昵称'];
                const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
                const highlighted = nickname.replace(regex, '<span style="color: #ff2442; font-weight: 500;">$1</span>');
                
                div.innerHTML = `<span>${highlighted}</span>`;
                
                div.addEventListener('click', () => {
                    searchInput.value = nickname;
                    hideSuggestions();
                    performSearch(nickname);
                });
                
                suggestionsDropdown.appendChild(div);
            });
            
            suggestionsDropdown.classList.remove('hidden');
        }
        
        // 隐藏联想列表
        function hideSuggestions() {
            suggestionsDropdown.classList.add('hidden');
        }
        
        // 处理查询
        function handleSearch() {
            const query = searchInput.value.trim();
            if (query.length === 0) {
                showResult('warning', '请输入昵称');
                return;
            }
            hideSuggestions();
            performSearch(query);
        }
        
        // 执行精确匹配查询
        function performSearch(query) {
            const exactMatch = kocData.find(item => item['昵称'] === query);
            
            if (exactMatch) {
                showResult('hit', exactMatch);
            } else {
                showResult('miss', null, query);
            }
        }
        
        // 显示结果
        function showResult(type, data, query = '') {
            resultContainer.classList.remove('hidden');
            resultContainer.innerHTML = '';
            
            const resultDiv = document.createElement('div');
            resultDiv.className = 'slide-up-fade-in';
            
            if (type === 'hit') {
                // 已建联：红色状态文字 + Ghost Button
                resultDiv.innerHTML = `
                   <p style="color: #ff2442; font-size: 18px; font-weight: 500; margin-bottom: 20px;">该 KOC 已建联</p>
                    <a 
                        href="${data['主页链接']}" 
                        target="_blank" 
                        class="ghost-btn inline-flex items-center gap-2 px-6 py-3 rounded-full text-sm font-medium transition-all duration-200"
                    >
                        <span>访问小红书主页</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                    </a>
                `;
            } else if (type === 'miss') {
                // 未建联：柔和灰色文字
                resultDiv.innerHTML = `
                    <p style="color: ${currentTheme === 'dark' ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.45)'}; font-size: 16px; font-weight: 400;">
                        该 KOC 未建联，可拓
                    </p>
                `;
            } else if (type === 'warning') {
                resultDiv.innerHTML = `
                   <p style="color: ${currentTheme === 'dark' ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.5)'}; font-size: 15px;">
                        ${data}
                    </p>
                `;
            } else {
                // 错误状态
                resultDiv.innerHTML = `
                    <p style="color: ${currentTheme === 'dark' ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.4)'}; font-size: 15px;">
                        ${data}
                    </p>
                `;
            }
            
            resultContainer.appendChild(resultDiv);
        }
        
        // 主题切换
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            if (currentTheme === 'light') {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色模式';
            } else {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeIcon.textContent = '🌙';
                themeText.textContent = '深色模式';
            }
        }
        
        // 更新数据显示时间
        function updateDataTimeDisplay() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            dataUpdateTime.textContent = `数据更新时间：${timeStr}`;
        }
        
        // 转义正则特殊字符
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        // 启动应用
        init();
    </script>
</body>
</html>
